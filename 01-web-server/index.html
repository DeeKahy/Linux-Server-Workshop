<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Server</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 80px auto;
            text-align: center;
            background: #f0f4ff;
            color: #222;
        }
        h1 { font-size: 3em; margin-bottom: 0.2em; }
        p  { font-size: 1.2em; color: #555; }
        .box {
            margin-top: 40px;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>It works!</h1>
    <p>You're hosting this page from a real Linux server.</p>

    <div class="box">
        <p>Try editing <strong>index.html</strong> and refreshing this page.</p>
        <p>Change the text, colours, anything you like!</p>
    </div>
</body>
</html>
